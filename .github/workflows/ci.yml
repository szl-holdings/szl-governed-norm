name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps + signing lib
        run: |
          pip install pytest "torch>=2.5" --index-url https://download.pytorch.org/whl/cpu
          pip install "git+https://github.com/szl-holdings/szl-receipt.git@v0.1.0"
      - name: Stage universal kernel for import
        run: |
          mkdir -p build/torch-universal
          cp -r torch-ext/szl_governed_norm build/torch-universal/
      - name: Run pytest
        run: pytest -q
