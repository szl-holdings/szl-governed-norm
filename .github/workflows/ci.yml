name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps + signing lib
        run: |
          # pytest + numpy come from PyPI (default index); torch from the CPU
          # wheel index. These MUST be separate installs: --index-url *replaces*
          # the primary index, and download.pytorch.org/whl/cpu does not host
          # pytest (it 403s), so a combined `pip install pytest torch --index-url
          # ...` fails with "No matching distribution found for pytest". numpy is
          # required by the governed receipt digest (tensor.cpu().numpy()) but is
          # NOT a declared dependency of the torch CPU wheel, so it is installed
          # explicitly here — otherwise the receipt tests raise
          # "RuntimeError: Numpy is not available".
          pip install pytest numpy
          pip install "torch>=2.5" --index-url https://download.pytorch.org/whl/cpu
          pip install "git+https://github.com/szl-holdings/szl-receipt.git@v0.2.0"
      - name: Stage universal kernel for import
        run: |
          mkdir -p build/torch-universal
          cp -r torch-ext/szl_governed_norm build/torch-universal/
      - name: Run pytest
        run: pytest -q
